trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'   # the self-hosted agent pool from Step 2

steps:
  - checkout: self

  - script: |
      echo "Deploying index.html to nginx web root"
      sudo cp $(Build.SourcesDirectory)/index.html /var/www/html/index.html
      sudo systemctl reload nginx
    displayName: 'Deploy to Nginx'